<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Acolyte Cloud</title>
  <style>
    @keyframes cursor-blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #020617;
      color: #A56EFF;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-weight: 600;
      font-size: 1.25rem;
      letter-spacing: 0.03em;
      gap: 0.25em;
    }
    .prompt {
      font-size: 0.78em;
      opacity: 0.7;
    }
    .cursor {
      display: inline-block;
      height: 1.05em;
      width: 0.55em;
      background: currentColor;
      opacity: 0.5;
      animation: cursor-blink 1s steps(2, start) infinite;
    }
  </style>
</head>
<body>
  <span class="logo">
    <span class="prompt">&#10095;</span>
    <span>acolyte</span>
    <span class="cursor"></span>
  </span>
</body>
</html>
